<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>NexGenomics</title>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#0f1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/brand/icon-512.png" />
    <meta name="twitter:card" content="summary" />

    <!--
      Pre-paint theme bootstrap: apply the persisted/system theme to <html>
      before React mounts so there is no light-then-dark flash. The full theme
      logic lives in src/theme; this is the minimal inline mirror of its read.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fabric.theme')
          var dark = stored
            ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.toggle('dark', dark)
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
